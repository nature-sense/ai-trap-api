openapi: "3.1.0"

info:
  title: Insect Trap API
  version: "2.0.0"
  description: REST API for the yolo-trap insect detection system

servers:
  - url: http://{host}:8080
    variables:
      host:
        default: trap.local

# ─────────────────────────────────────────────────────────────────────────────
#  Paths
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ── Trap identity ────────────────────────────────────────────────────────────

  /api/trap:
    get:
      summary: Get trap identity and location
      operationId: getTrap
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrapInfo"

  # ── Capture control ──────────────────────────────────────────────────────────

  /api/capture:
    get:
      summary: Get current detection state and active session ID
      operationId: getCapture
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptureState"

    post:
      summary: Start or stop detection (MJPEG stream always runs)
      operationId: postCapture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
      responses:
        "200":
          description: Updated state
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean

  # ── Status ──────────────────────────────────────────────────────────────────

  /api/status:
    get:
      summary: System health and runtime stats
      operationId: getStatus
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"

  # ── SSE events ──────────────────────────────────────────────────────────────

  /api/events:
    get:
      summary: Redirect to SSE event stream (detection events, crop saved, etc.)
      operationId: getEvents
      responses:
        "307":
          description: Temporary redirect to SSE server
          headers:
            Location:
              schema:
                type: string
                example: "http://192.168.5.1:8081/api/events"

  # ── Crops ────────────────────────────────────────────────────────────────────

  /api/crops:
    get:
      summary: List all saved crop images
      operationId: getCrops
      responses:
        "200":
          description: Array of crop metadata records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CropItem"

  /api/crops/{path}:
    get:
      summary: >
        Serve a saved crop JPEG. Path is either a bare filename
        ("insect_42.jpg") for legacy crops or a session-relative path
        ("20260314_153042/insect_42.jpg") for session-scoped crops.
        At most one subdirectory level is allowed; ".." is rejected.
      operationId: getCropFile
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
            example: "20260314_153042/insect_42.jpg"
      responses:
        "200":
          description: JPEG image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Config mutations ─────────────────────────────────────────────────────────

  /api/config/location:
    post:
      summary: Set trap GPS location
      operationId: postConfigLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lon]
              properties:
                lat:
                  type: number
                  format: double
                  example: 51.5074
                lon:
                  type: number
                  format: double
                  example: -0.1278
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /api/config/threshold:
    post:
      summary: Set detection confidence threshold
      operationId: postConfigThreshold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: number
                  format: float
                  minimum: 0.0
                  maximum: 1.0
                  exclusiveMinimum: true
                  exclusiveMaximum: true
                  example: 0.45
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Autofocus ────────────────────────────────────────────────────────────────

  /api/af/trigger:
    post:
      summary: Trigger a one-shot autofocus cycle
      operationId: postAfTrigger
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── Sync ─────────────────────────────────────────────────────────────────────
  #
  #  The sync protocol allows a companion app (phone / cloud gateway) to pull
  #  unsynced crop files over HTTP without needing SSH or SCP.
  #
  #  Typical flow:
  #    1.  POST /api/sync/session       → get sessionId + pending count
  #    2.  GET  /api/sync/session/{id}  → get manifest (list of files + metadata)
  #    3.  GET  /api/crops/{file}       → download each file
  #    4.  POST /api/sync/ack           → mark files as synced
  #    5.  DELETE /api/sync/session/{id}→ mark session done, optionally free disk

  /api/sync/session:
    post:
      summary: Open a new sync session; returns count of pending (unsynced) crops
      operationId: postSyncSession
      responses:
        "200":
          description: Sync session opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncSessionOpened"
        "503":
          description: Sync manager unavailable

  /api/sync/session/{id}:
    get:
      summary: Get manifest of unsynced crops for a sync session
      operationId: getSyncSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: "sess_20260314_153042"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncManifest"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Close sync session and optionally delete synced files from disk
      operationId: deleteSyncSession
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncDeleteResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/sync/ack:
    post:
      summary: Acknowledge that a set of files have been successfully received
      operationId: postSyncAck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncAck"
      responses:
        "200":
          description: Number of rows marked synced
          content:
            application/json:
              schema:
                type: object
                properties:
                  acked:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          description: Sync manager unavailable

# ─────────────────────────────────────────────────────────────────────────────
#  Components
# ─────────────────────────────────────────────────────────────────────────────

components:

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Ok:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: ok

  schemas:

    # ── Trap identity ──────────────────────────────────────────────────────────

    TrapInfo:
      type: object
      required: [id, location]
      properties:
        id:
          type: string
          description: Unique trap identifier
          example: trap_001
        location:
          type: string
          description: Human-readable location description
          example: "Garden shed, north wall"

    # ── Capture state ──────────────────────────────────────────────────────────

    CaptureState:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
          description: Whether detection (inference/tracking/saving) is running
        sessionId:
          type: string
          nullable: true
          description: >
            ID of the current capture session (YYYYMMDD_HHMMSS format).
            null when not capturing.
          example: "20260314_153042"

    # ── Status ─────────────────────────────────────────────────────────────────

    Status:
      type: object
      required: [id, location, capturing, uptime_s, fps, detections, tracks,
                 db_mb, sse_clients]
      properties:
        id:
          type: string
          description: Trap identifier
          example: trap_001
        location:
          type: string
          description: Trap location
        capturing:
          type: boolean
          description: Whether detection is currently active
        sessionId:
          type: string
          nullable: true
          description: Active capture session ID, or null if not capturing
          example: "20260314_153042"
        uptime_s:
          type: integer
          description: Seconds since process start
        fps:
          type: number
          format: float
          description: Current capture framerate
        detections:
          type: integer
          format: int64
          description: Total detection rows in database
        tracks:
          type: integer
          format: int64
          description: Total unique tracks in database
        db_mb:
          type: number
          format: double
          description: Database file size in megabytes
        sse_clients:
          type: integer
          description: Number of currently connected SSE clients

    # ── Crops ──────────────────────────────────────────────────────────────────

    CropItem:
      type: object
      required: [file, bytes, trackId, conf, timestampUs, label, session]
      properties:
        file:
          type: string
          description: >
            Session-relative path used as the DB key and as the tail of the
            GET /api/crops/{path} URL.
            Format is either "filename.jpg" (legacy) or
            "sessionId/filename.jpg".
          example: "20260314_153042/insect_42.jpg"
        bytes:
          type: integer
          format: int64
          description: JPEG file size in bytes
        trackId:
          type: integer
          description: ByteTracker track ID
        conf:
          type: number
          format: float
          description: Detection confidence at time of save
        timestampUs:
          type: integer
          format: int64
          description: Unix timestamp of the frame in microseconds
        label:
          type: string
          description: Class label string
          example: moth
        session:
          type: string
          description: Capture session ID that produced this crop
          example: "20260314_153042"
        temperatureC:
          type: number
          format: float
          nullable: true
          description: Ambient temperature in °C at time of save. Null if no sensor fitted.
          example: 18.4
        humidityPct:
          type: number
          format: float
          nullable: true
          description: Relative humidity in % at time of save. Null if no sensor fitted.
          example: 72.1
        pressureHpa:
          type: number
          format: float
          nullable: true
          description: Atmospheric pressure in hPa at time of save. Null if no sensor fitted.
          example: 1013.25

    # ── Sync ───────────────────────────────────────────────────────────────────

    SyncSessionOpened:
      type: object
      required: [sessionId, pending]
      properties:
        sessionId:
          type: string
          description: Opaque session token to use in subsequent sync calls
          example: "sess_20260314_153042"
        pending:
          type: integer
          format: int64
          description: Number of crop files not yet acknowledged

    SyncManifest:
      type: object
      required: [sessionId, pending, crops]
      properties:
        sessionId:
          type: string
        pending:
          type: integer
          format: int64
        crops:
          type: array
          items:
            $ref: "#/components/schemas/SyncCropEntry"

    SyncCropEntry:
      type: object
      required: [file, bytes, trackId, label, conf, timestampUs]
      properties:
        file:
          type: string
          description: Path relative to crops dir, used in GET /api/crops/{path}
          example: "20260314_153042/insect_42.jpg"
        bytes:
          type: integer
          format: int64
        trackId:
          type: integer
        label:
          type: string
        conf:
          type: number
          format: float
        timestampUs:
          type: integer
          format: int64
        temperatureC:
          type: number
          format: float
          nullable: true
          description: Ambient temperature in °C at time of save. Null if no sensor fitted.
        humidityPct:
          type: number
          format: float
          nullable: true
          description: Relative humidity in % at time of save. Null if no sensor fitted.
        pressureHpa:
          type: number
          format: float
          nullable: true
          description: Atmospheric pressure in hPa at time of save. Null if no sensor fitted.

    SyncAck:
      type: object
      required: [sessionId, files]
      properties:
        sessionId:
          type: string
          description: Sync session ID returned by POST /api/sync/session
        files:
          type: array
          description: List of file paths that were successfully received
          items:
            type: string
          example: ["20260314_153042/insect_42.jpg", "20260314_153042/insect_43.jpg"]

    SyncDeleteResult:
      type: object
      required: [deleted, bytesFreed, notFound]
      properties:
        deleted:
          type: integer
          format: int64
          description: Number of files deleted from disk
        bytesFreed:
          type: integer
          format: int64
          description: Total bytes freed
        notFound:
          type: integer
          format: int64
          description: Files that were already gone from disk

    # ── Error ──────────────────────────────────────────────────────────────────

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
